apiVersion: apps/v1
kind: Deployment
metadata:
  name: spiffe-helper-webhook
  namespace: zero-trust-workload-identity-manager
  labels:
    app.kubernetes.io/name: spiffe-helper
    app.kubernetes.io/instance: spire
    app.kubernetes.io/managed-by: "zero-trust-workload-identity-manager"
    app.kubernetes.io/part-of: "zero-trust-workload-identity-manager"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spiffe-helper-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spiffe-helper-webhook
        app.kubernetes.io/instance: spire
        app.kubernetes.io/managed-by: "zero-trust-workload-identity-manager"
        app.kubernetes.io/part-of: "zero-trust-workload-identity-manager"
    spec:
      serviceAccountName: controller-manager
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: webhook
        image: controller:latest
        command:
        - /usr/bin/zero-trust-workload-identity-manager
        args:
        - --serve-webhook
        - --webhook-cert-dir=/tmp/k8s-webhook-server/serving-certs
        - --health-probe-bind-address=:8082
        ports:
        - containerPort: 9443
          name: webhook
          protocol: TCP
        - containerPort: 8082
          name: health
          protocol: TCP
        env:
        - name: OPERATOR_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: RELATED_IMAGE_SPIFFE_HELPER
          value: ghcr.io/spiffe/spiffe-helper:0.11.0
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
        volumeMounts:
        - name: webhook-certs
          mountPath: /tmp/k8s-webhook-server/serving-certs
          readOnly: true
      volumes:
      - name: webhook-certs
        secret:
          secretName: spiffe-helper-webhook-certs
      terminationGracePeriodSeconds: 10
